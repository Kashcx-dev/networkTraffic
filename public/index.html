<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostics</title>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #0f0f0f;
            border: 1px solid #1e3a8a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #3b82f6;
            margin-top: 0;
        }
        p {
            color: #a3a3a3;
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #1e3a8a;
            border-radius: 6px;
            background-color: #0a0a0a;
            color: #e0e0e0;
            outline: none;
            margin-bottom: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        input[type="text"]::placeholder {
            color: #555;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #1e3a8a;
            cursor: not-allowed;
        }
        #results {
            margin-top: 25px;
            text-align: left;
            display: none;
            background-color: #000000;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }
        .result-item {
            margin: 10px 0;
            font-size: 15px;
        }
        .status-good { color: #4ade80; font-weight: bold; }
        .status-fair { color: #facc15; font-weight: bold; }
        .status-poor { color: #f87171; font-weight: bold; }
        .thank-you {
            color: #3b82f6;
            font-weight: 600;
            margin-top: 20px;
        }
        .loader {
            border: 3px solid #1e3a8a;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Network Check</h1>
        <p>Enter your name and click Proceed to test your connection.</p>

        <input type="text" id="nameInput" placeholder="Your Name" />
        <div id="loader" class="loader"></div>
        <button id="proceedBtn">Proceed</button>

        <div id="results"></div>
    </div>

    <script>
        // Speed test runs IN THE BROWSER so it measures the visitor's actual connection
        async function runSpeedTest() {
            const downloadUrl = 'https://speed.cloudflare.com/__down?bytes=25000000';
            const startTime = performance.now();

            const response = await fetch(downloadUrl, { cache: 'no-store' });
            const blob = await response.blob();

            const endTime = performance.now();
            const durationInSeconds = (endTime - startTime) / 1000;
            const bitsLoaded = blob.size * 8;
            const speedMbps = (bitsLoaded / durationInSeconds / 1000000).toFixed(2);

            return {
                speedMbps: speedMbps,
                duration: durationInSeconds.toFixed(2),
                downloadedMB: (blob.size / 1024 / 1024).toFixed(2)
            };
        }

        document.getElementById('proceedBtn').addEventListener('click', async () => {
            const btn = document.getElementById('proceedBtn');
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            const nameInput = document.getElementById('nameInput');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.style.borderColor = '#f87171';
                nameInput.focus();
                return;
            }
            nameInput.style.borderColor = '#1e3a8a';

            btn.style.display = 'none';
            nameInput.disabled = true;
            loader.style.display = 'block';
            resultsDiv.style.display = 'none';

            try {
                // 1. Run speed test in the browser
                const data = await runSpeedTest();

                // 2. Determine quality
                let stability = 'Unknown';
                if (navigator.connection) {
                    stability = navigator.connection.effectiveType || 'Unknown';
                }

                let statusClass = 'status-good';
                let statusText = 'Excellent';
                const speed = parseFloat(data.speedMbps);

                if (speed < 25) {
                    statusClass = 'status-fair';
                    statusText = 'Fair';
                }
                if (speed < 5) {
                    statusClass = 'status-poor';
                    statusText = 'Poor';
                }

                // 3. Show only speed and quality on screen
                resultsDiv.innerHTML = `
                    <div class="result-item"><strong>Download Speed:</strong> ${data.speedMbps} Mbps</div>
                    <div class="result-item"><strong>Network Quality:</strong> <span class="${statusClass}">${statusText}</span></div>
                `;
                resultsDiv.style.display = 'block';

                // 4. Gather extra metrics silently for Google Sheets
                const conn = navigator.connection || {};
                const extraMetrics = {
                    name: name,
                    speedMbps: data.speedMbps,
                    downloadedMB: data.downloadedMB,
                    duration: data.duration,
                    connectionType: conn.effectiveType || 'Unknown',
                    rtt: conn.rtt || 'N/A',
                    downlinkEstimate: conn.downlink || 'N/A',
                    dataSaver: conn.saveData ? 'Yes' : 'No',
                    platform: navigator.platform || 'Unknown',
                    userAgent: navigator.userAgent || 'Unknown'
                };

                fetch('/api/speedtest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(extraMetrics)
                }).catch(() => {});

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="result-item status-poor"><strong>Error:</strong> Failed to reach the test server. You might be offline or experiencing severe packet loss.</div>
                `;
                resultsDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.style.display = 'none';

                const thankYou = document.createElement('p');
                thankYou.className = 'thank-you';
                thankYou.textContent = 'Thank you for testing! Your results have been recorded.';
                btn.parentNode.insertBefore(thankYou, resultsDiv.nextSibling);
            }
        });
    </script>
</body>
</html>
